<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for better visibility in small size -->
  <circle cx="50" cy="50" r="45" fill="url(#faviconGradient)" opacity="0.2" />
  
  <!-- Three layered triangular shapes forming a modern symbol -->
  <path
    d="M 50 20 L 75 45 L 50 40 Z"
    fill="#3b82f6"
  />
  <path
    d="M 50 40 L 75 45 L 65 70 L 50 65 Z"
    fill="#6366f1"
  />
  <path
    d="M 50 40 L 50 65 L 35 70 L 25 45 Z"
    fill="#8b5cf6"
  />
  
  <!-- Center dot for emphasis -->
  <circle cx="50" cy="50" r="4" fill="white" />
</svg>
